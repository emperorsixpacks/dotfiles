format = """\
$os\
$directory\
$git_branch\
$git_status\
 $character\
"""

palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[os]
format = "[💀](fg:#f5c2e7) "

[username]
style_user = "fg:#a6e3a1"
style_root = "fg:#f38ba8"
format = "[$user@$host]($style_user):"
disabled = false
show_always = true

[directory]
style = "fg:#f5c2e7"
truncation_length = 2
truncation_symbol = "…/"
format = "[$path]($style)"

[git_branch]
style = "fg:#cba6f7"
format = "[$symbol$branch]($style)"

[git_status]
style = "fg:#fab387"
format = ' [\($all_status$ahead_behind\)]($style)'
conflicted = "conflict"
ahead = "↑$count"
behind = "↓$count"
diverged = "↑$ahead_count↓$behind_count"
up_to_date = ""
untracked = "??"
stashed = "stash"
modified = "M"
staged = "+"
renamed = "R"
deleted = "D"

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"
format = "$symbol "
